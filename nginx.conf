events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Railway / Docker internal DNS resolver
        resolver 127.0.0.11 valid=10s ipv6=off;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls dynamically
        location /api/ {
            set $backend_service "http://cicd-learning.railway.internal:8080";
            proxy_pass $backend_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy health checks dynamically
        location /health {
            set $backend_service "http://cicd-learning.railway.internal:8080";
            proxy_pass $backend_service/health;
        }
    }
}