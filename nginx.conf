server {
    listen 80;
    
    # Catch all incoming traffic from the Railway domain
    server_name _;

    # 1. Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Ensures that frontend frameworks (React, Vue, Angular) route correctly
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to the Flask backend over the private network
    location /api/ {
        proxy_pass http://cicd-learning.railway.internal:8080;
        
        # Pass essential request data to Flask
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy the health check endpoint
    location /health {
        proxy_pass http://cicd-learning.railway.internal:8080;
        
        # Pass essential request data to Flask
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}