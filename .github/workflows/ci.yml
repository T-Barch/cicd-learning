name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t barch2002/cicd-learning-backend:latest -f Dockerfile .

      - name: Push Backend Image
        run: docker push barch2002/cicd-learning-backend:latest

      - name: Build Frontend Image
        run: docker build -t barch2002/cicd-learning-frontend:latest -f Dockerfile.nginx .

      - name: Push Frontend Image
        run: docker push barch2002/cicd-learning-frontend:latest