services:
  # Frontend: Nginx Reverse Proxy
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: barch2002/cicd-learning-frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      # Native shell check that works in virtually all environments (including minimal nginx)
      test: ["CMD-SHELL", "cat /dev/null > /dev/tcp/127.0.0.1/80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend: Flask API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: barch2002/cicd-learning-backend:latest
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      FLASK_ENV: production
      INSTANCE: "1"
      # Dynamically injected from your local hidden .env file
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - backend_data:/data
    depends_on:
      database:
        condition: service_healthy
    networks:
      app_network:
        aliases:
          - cicd-learning.railway.internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Database: PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: database
    environment:
      # Dynamically injected from your local hidden .env file
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - database_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      # Dynamically uses the variables so healthcheck doesn't fail if you change them
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

# Named volumes (persist data across container restarts)
volumes:
  backend_data:
    driver: local
  database_data:
    driver: local

# Network (internal communication)
networks:
  app_network:
    driver: bridge